# Docker Compose - Production Build
# For testing production builds locally before deploying

version: '3.8'

services:
  # React Frontend (for local production testing)
  client:
    build:
      context: ../client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
        VITE_AI_SERVICE_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - codeinsight-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Node.js Backend
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://localhost:3000
      - CORS_ORIGINS=http://localhost:3000
      - LOG_LEVEL=info
    depends_on:
      ai-service:
        condition: service_healthy
    networks:
      - codeinsight-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Python AI Service
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo-preview}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5000
      - LOG_LEVEL=INFO
    networks:
      - codeinsight-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  codeinsight-prod:
    driver: bridge

volumes:
  mongo-data:
