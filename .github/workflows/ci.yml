name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # ── Backend (Node.js) ──────────────────────────────────────────────────────
  test-backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint --if-present

  # ── AI Service (Python) ────────────────────────────────────────────────────
  test-ai-service:
    name: AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          pip install flake8
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics

  # ── Frontend (React/Vite) ──────────────────────────────────────────────────
  test-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.example.com
          VITE_AI_SERVICE_URL: https://ai.example.com

  # ── Security Audit ─────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: npm audit (backend)
        working-directory: server
        run: npm audit --audit-level=critical || true

      - name: npm audit (frontend)
        working-directory: client
        run: npm audit --audit-level=critical || true

  # ── Summary ────────────────────────────────────────────────────────────────
  summary:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [test-backend, test-ai-service, test-frontend, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Done
        run: |
          echo "✅ All CI checks passed on main!"
          echo "  Backend:    Node.js lint"
          echo "  AI Service: Python syntax check"
          echo "  Frontend:   Build + lint"
          echo "  Security:   npm audit"
