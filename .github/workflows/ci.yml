name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # ==========================================
  # Backend Tests (Node.js)
  # ==========================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci

      - name: Build check
        run: npm run build --if-present

  # ==========================================
  # AI Service Tests (Python)
  # ==========================================
  test-ai-service:
    name: Test AI Service
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter
        run: |
          pip install flake8
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        run: pytest -v --tb=short
        env:
          ENVIRONMENT: test

      - name: Type check
        run: |
          pip install mypy
          mypy app --ignore-missing-imports || true

  # ==========================================
  # Frontend Tests (React/Vite)
  # ==========================================
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.example.com
          VITE_AI_SERVICE_URL: https://ai.example.com

  # ==========================================
  # Docker Build Test
  # ==========================================
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [test-backend, test-ai-service, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: codeinsight-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AI service image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: false
          tags: codeinsight-ai:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: codeinsight-frontend:test
          build-args: |
            VITE_API_URL=https://api.example.com
            VITE_AI_SERVICE_URL=https://ai.example.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Security Scan
  # ==========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test-backend, test-ai-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit (backend)
        working-directory: server
        run: npm audit --audit-level=high || true

      - name: Run npm audit (frontend)
        working-directory: client
        run: npm audit --audit-level=high || true

      - name: Run pip-audit (AI service)
        working-directory: ai-service
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

  # ==========================================
  # Deploy Notifications (on main)
  # ==========================================
  notify-deploy:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deployment Notice
        run: |
          echo "🚀 All tests passed on main branch!"
          echo "Deployments will be triggered automatically:"
          echo "  - Vercel: Frontend"
          echo "  - Render: Backend"
          echo "  - Railway: AI Service"
